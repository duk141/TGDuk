<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>AI Xúc Xắc 3-18</title>

<style>
body{
    font-family:Arial;
    background:#0f172a;
    color:white;
    text-align:center;
    padding:30px;
}

.container{
    max-width:600px;
    margin:auto;
    background:#1e293b;
    padding:20px;
    border-radius:15px;
}

button{
    padding:12px 18px;
    margin:5px;
    font-size:16px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#334155;
    color:white;
}

button:hover{
    background:#475569;
}

.result{
    margin-top:20px;
    font-size:16px;
    white-space:pre-line;
}
</style>

</head>

<body>

<div class="container">

<h2>🎲 AI XÚC XẮC (3 - 18)</h2>

<p>Bấm số tổng (3 → 18)</p>

<div id="buttons"></div>

<button onclick="undo()">↩️ UNDO</button>

<div class="result" id="result"></div>

</div>

<script>

// =====================
// 📦 HISTORY
// =====================
let history = [];

// tạo nút 3-18
let btnBox = document.getElementById("buttons");

for(let i=3;i<=18;i++){
    let b = document.createElement("button");
    b.innerText = i;
    b.onclick = () => add(i);
    btnBox.appendChild(b);
}

// =====================
// ➕ ADD
// =====================
function add(num){
    history.push(num);
    train();
    predict();
}

// =====================
// ↩️ UNDO
// =====================
function undo(){
    history.pop();
    predict();
}

// =====================
// 📊 ANALYZE
// =====================
function analyze(arr){

    let result = {
        avg:0,
        min:0,
        max:0,
        currentStreak:0,
        longestStreak:0,
        streakValue:0,
        betType:"NONE",
        stability:0,
        features:{}
    };

    if(arr.length === 0) return result;

    // 📊 stats
    let sum = arr.reduce((a,b)=>a+b,0);
    result.avg = sum / arr.length;

    result.min = Math.min(...arr);
    result.max = Math.max(...arr);

    // 🔥 current streak
    let last = arr[arr.length-1];
    let c=1;

    for(let i=arr.length-2;i>=0;i--){
        if(arr[i]===last) c++;
        else break;
    }

    result.currentStreak = c;
    result.streakValue = last;

    // 📈 longest streak
    let m=1,t=1;
    for(let i=1;i<arr.length;i++){
        if(arr[i]===arr[i-1]){
            t++;
            m=Math.max(m,t);
        }else t=1;
    }

    result.longestStreak = m;

    // 🔥 BỆT
    if(m >= 4) result.betType = "BỆT MẠNH";
    else if(m === 3) result.betType = "BỆT NHẸ";
    else result.betType = "KHÔNG BỆT";

    // 📉 stability
    let diff=0;

    for(let i=1;i<arr.length;i++){
        diff += Math.abs(arr[i]-arr[i-1]);
    }

    let raw = 1 - (diff / (arr.length * 15));

    result.stability = Math.max(0, Math.min(1, raw));

    // features
    result.features = {
        avg: result.avg/18,
        streak: result.currentStreak/10,
        volatility: (result.max - result.min)/18,
        stability: result.stability
    };

    return result;
}

// =====================
// 🤖 NEURAL NETWORK
// =====================
let weights = {
    avg: Math.random(),
    streak: Math.random(),
    volatility: Math.random(),
    stability: Math.random()
};

let bias = Math.random();

function sigmoid(x){
    return 1/(1+Math.exp(-x));
}

// =====================
// 🧠 OUTPUT
// =====================
function neuralOutput(f){

    let score =
        f.avg * weights.avg +
        f.streak * weights.streak +
        f.volatility * weights.volatility +
        f.stability * weights.stability +
        bias;

    return sigmoid(score);
}

// =====================
// 🧠 TRAIN
// =====================
function train(){

    if(history.length < 6) return;

    let data = analyze(history.slice(0,-1));

    // normalize target (3-18 → 0-1)
    let target = (history[history.length-1] - 3) / 15;

    let out = neuralOutput(data.features);

    let error = target - out;

    let lr = 0.005;

    weights.avg += lr * error * data.features.avg;
    weights.streak += lr * error * data.features.streak;
    weights.volatility += lr * error * data.features.volatility;
    weights.stability += lr * error * data.features.stability;

    bias += lr * error;
}

// =====================
// 🎯 PREDICT
// =====================
function predict(){

    if(history.length < 3){
        document.getElementById("result").innerText =
        "Cần ít nhất 3 số (3-18)";
        return;
    }

    let data = analyze(history);

    let prob = neuralOutput(data.features);

    // số dự đoán 3-18
    let predictedNum = Math.round(3 + prob * 15);

    // 👉 CHUYỂN SANG TÀI / XỈU
    let predictedText = (predictedNum >= 11) ? "TÀI" : "XỈU";

    document.getElementById("result").innerText = `
🎲 AI XÚC XẮC 3-18

📊 Lịch sử: ${history.join(" ")}

🎯 Dự đoán số: ${predictedNum}
🔥 Dự đoán: ${predictedText}

📈 Xác suất: ${(prob*100).toFixed(2)}%

🔥 Bệt: ${data.betType} (max ${data.longestStreak})
📊 Trung bình: ${data.avg.toFixed(2)}
📉 Min/Max: ${data.min} / ${data.max}

📊 Stability: ${(data.stability*100).toFixed(1)}%
🔥 Chuỗi hiện tại: ${data.streakValue} (${data.currentStreak})
`;
}

</script>

</body>
</html>
