<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>TX AUTO API</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:#1f1f1f;
  padding:20px;
  color:white;
}

.card{
  width:100%;
  max-width:380px;
  margin:auto;
  background:#ffc400;
  border-radius:25px;
  padding:20px;
  border:4px solid #111;
  box-shadow:0 5px 20px rgba(0,0,0,.5);
}

.title{
  font-size:30px;
  font-weight:bold;
  color:#111;
  margin-bottom:10px;
}

.session{
  font-size:28px;
  font-weight:bold;
  color:#111;
  margin-bottom:20px;
}

.status{
  background:#111;
  color:#00ff90;
  padding:10px;
  border-radius:10px;
  text-align:center;
  margin-bottom:15px;
  font-size:20px;
}

.diceBox{
  display:flex;
  justify-content:center;
  gap:15px;
  margin-bottom:20px;
}

.dice{
  width:75px;
  height:75px;
  border-radius:50%;
  background:white;
  color:#111;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:34px;
  font-weight:bold;
  border:3px solid #111;
}

.result{
  text-align:center;
  font-size:40px;
  font-weight:bold;
  margin-bottom:15px;
  color:#111;
}

.predict{
  background:#111;
  color:#fff;
  padding:15px;
  border-radius:15px;
  text-align:center;
  font-size:28px;
  font-weight:bold;
  margin-bottom:20px;
}

.info{
  background:white;
  border-radius:15px;
  padding:15px;
  color:#111;
  font-size:20px;
  line-height:1.8;
}

.history{
  margin-top:20px;
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.item{
  width:45px;
  height:45px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-weight:bold;
}

.tai{
  background:#ff3b30;
}

.xiu{
  background:#007aff;
}

</style>
</head>
<body>

<div class="card">

  <div class="title">
    TOOL TX API
  </div>

  <div class="session"
  id="session">
    #000000
  </div>

  <div class="status"
  id="status">
    ĐANG KẾT NỐI API...
  </div>

  <div class="diceBox">

    <div class="dice"
    id="d1">?</div>

    <div class="dice"
    id="d2">?</div>

    <div class="dice"
    id="d3">?</div>

  </div>

  <div class="result"
  id="result">
    ...
  </div>

  <div class="predict"
  id="predict">
    PHÂN TÍCH...
  </div>

  <div class="info"
  id="info">

    Tổng: 0<br>
    Người cược: 0<br>
    Tài: 0<br>
    Xỉu: 0<br>
    Tiền cược: 0

  </div>

  <div class="history"
  id="history"></div>

</div>

<script>

// ======================
// API URL
// ======================

const API_URL =
"https://strategy-cube-vinyl-warcraft.trycloudflare.com/api/txmd5";

// ======================
// HISTORY
// ======================

let historyData = [];

// ======================
// GET DATA
// ======================

async function getData(){

  try{

    let res =
    await fetch(API_URL);

    let data =
    await res.json();

    updateUI(data);

  }catch(err){

    console.log(err);

    document
    .getElementById("status")
    .innerHTML =
    "MẤT KẾT NỐI API";

  }
}

// ======================
// UPDATE UI
// ======================

function updateUI(data){

  // phiên

  document
  .getElementById("session")
  .innerHTML =
  "#" + data.phien;

  // trạng thái

  document
  .getElementById("status")
  .innerHTML =
  data.betting_info.trang_thai
  + " | "
  + data.betting_info.dem_nguoc
  + "s";

  // xúc xắc

  document
  .getElementById("d1")
  .innerHTML =
  data.xuc_xac_1;

  document
  .getElementById("d2")
  .innerHTML =
  data.xuc_xac_2;

  document
  .getElementById("d3")
  .innerHTML =
  data.xuc_xac_3;

  // kết quả

  document
  .getElementById("result")
  .innerHTML =
  data.ket_qua;

  // info

  document
  .getElementById("info")
  .innerHTML = `

  Tổng: ${data.tong}<br>

  Người cược:
  ${data.betting_info
  .tong_nguoi_cuoc}<br>

  Tài:
  ${data.betting_info
  .tien_cuoc.tai}<br>

  Xỉu:
  ${data.betting_info
  .tien_cuoc.xiu}<br>

  Jackpot:
  ${data.betting_info
  .jackpot}

  `;

  // history

  historyData.push(data.ket_qua);

  if(historyData.length > 30){
    historyData.shift();
  }

  renderHistory();

  // predict

  let next =
  analyze();

  document
  .getElementById("predict")
  .innerHTML =
  "DỰ ĐOÁN: " + next;
}

// ======================
// RENDER HISTORY
// ======================

function renderHistory(){

  let html = "";

  historyData
  .slice()
  .reverse()
  .forEach(item=>{

    html += `

    <div class="
    item
    ${item==="Tài"
    ?"tai":"xiu"}">

    ${item==="Tài"
    ?"T":"X"}

    </div>

    `;

  });

  document
  .getElementById("history")
  .innerHTML = html;
}

// ======================
// ANALYZE
// ======================

function analyze(){

  if(historyData.length < 5){
    return "ĐANG HỌC CẦU";
  }

  let tai =
  historyData.filter(
  x=>x==="Tài").length;

  let xiu =
  historyData.filter(
  x=>x==="Xỉu").length;

  // đảo xác suất

  return tai > xiu
  ? "XỈU"
  : "TÀI";
}

// ======================
// AUTO API
// ======================

getData();

setInterval(()=>{

  getData();

},3000);

</script>

</body>
</html>
