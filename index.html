<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>AI Tài Xỉu 3-18</title>

<style>
body{
    font-family:Arial;
    background:#050816;
    color:white;
    text-align:center;
    padding:30px;
}

/* 💡 LED CONTAINER */
.container{
    max-width:650px;
    margin:auto;
    padding:25px;
    border-radius:18px;

    background:#0f172a;

    border:2px solid #00f5ff;
    box-shadow:
        0 0 10px #00f5ff,
        0 0 20px #00f5ff,
        0 0 40px #00f5ff;
    animation: glow 2s infinite alternate;
}

@keyframes glow{
    from{box-shadow:0 0 10px #00f5ff;}
    to{box-shadow:0 0 25px #ff00ff;}
}

button{
    padding:12px 16px;
    margin:4px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    background:#1e293b;
    color:white;
}

button:hover{
    background:#334155;
}

.result{
    margin-top:20px;
    font-size:16px;
    white-space:pre-line;
    text-align:left;
}
</style>
</head>

<body>

<div class="container">

<h2>🤖 AI TÀI XỈU (3-18)</h2>

<div id="buttons"></div>

<br>
<button onclick="undo()">↩️ UNDO</button>

<div class="result" id="result"></div>

</div>

<script>

let history = [];

// =====================
// tạo nút 3-18
// =====================
let box = document.getElementById("buttons");

for(let i=3;i<=18;i++){
    let b=document.createElement("button");
    b.innerText=i;
    b.onclick=()=>add(i);
    box.appendChild(b);
}

// =====================
// ➕ ADD
// =====================
function add(n){
    history.push(n);
    train();
    predict();
}

// =====================
function undo(){
    history.pop();
    predict();
}

// =====================
// 📊 ANALYZE
// =====================
function analyze(arr){

    let r={
        avg:0,
        min:0,
        max:0,
        streak:0,
        streakVal:0,
        longest:0,
        bet:"",
        tai:0,
        xiu:0,
        stability:0
    };

    if(arr.length===0) return r;

    let sum=arr.reduce((a,b)=>a+b,0);
    r.avg=sum/arr.length;

    r.min=Math.min(...arr);
    r.max=Math.max(...arr);

    let last=arr[arr.length-1];
    let c=1;

    for(let i=arr.length-2;i>=0;i--){
        if(arr[i]===last) c++;
        else break;
    }

    r.streak=c;
    r.streakVal=last;

    let m=1,t=1;
    for(let i=1;i<arr.length;i++){
        if(arr[i]===arr[i-1]){
            t++;
            m=Math.max(m,t);
        }else t=1;
    }

    r.longest=m;

    // =====================
    // T/X convert
    // =====================
    arr.forEach(v=>{
        if(v<=10) r.xiu++;
        else r.tai++;
    });

    // =====================
    // bệt
    // =====================
    if(m>=4) r.bet="🔥 BỆT MẠNH";
    else if(m===3) r.bet="⚡ BỆT NHẸ";
    else r.bet="❌ KHÔNG BỆT";

    // =====================
    // stability (mượt)
    // =====================
    let diff=0;
    for(let i=1;i<arr.length;i++){
        diff+=Math.abs(arr[i]-arr[i-1]);
    }

    r.stability=1-(diff/(arr.length*15));
    r.stability=Math.max(0,Math.min(1,r.stability));

    return r;
}

// =====================
// 🤖 NEURAL
// =====================
let w={avg:Math.random(),streak:Math.random(),stab:Math.random()};
let b=Math.random();

function sigmoid(x){return 1/(1+Math.exp(-x));}

function net(f){
    return sigmoid(
        f.avg*w.avg+
        f.streak*w.streak+
        f.stab*w.stab+
        b
    );
}

// =====================
// TRAIN
// =====================
function train(){

    if(history.length<6) return;

    let d=analyze(history.slice(0,-1));

    let target = (history[history.length-1] <= 10) ? 0 : 1;

    let out=net({
        avg:d.avg/18,
        streak:d.streak/10,
        stab:d.stability
    });

    let err=target-out;

    let lr=0.003;

    w.avg+=lr*err*(d.avg/18);
    w.streak+=lr*err*(d.streak/10);
    w.stab+=lr*err*d.stability;
    b+=lr*err;
}

// =====================
// 🎯 PREDICT
// =====================
function predict(){

    if(history.length<3){
        document.getElementById("result").innerText="Cần ít nhất 3 số";
        return;
    }

    let d=analyze(history);

    let p=net({
        avg:d.avg/18,
        streak:d.streak/10,
        stab:d.stability
    });

    // =====================
    // 🔥 SMOOTH % (KHÔNG NHẢY)
    // =====================
    let smoothP = p*0.7 + d.stability*0.3;

    let pTai = smoothP;
    let pXiu = 1-smoothP;

    let predicted = smoothP>0.5?"TÀI":"XỈU";

    document.getElementById("result").innerText=`
🎲 AI TÀI XỈU 3-18

📊 Lịch sử: ${history.join(" ")}

🎯 Dự đoán: ${predicted}

📈 % TÀI: ${(pTai*100).toFixed(2)}%
📉 % XỈU: ${(pXiu*100).toFixed(2)}%

🔥 Bệt: ${d.bet} (max ${d.longest})
📊 Stability: ${(d.stability*100).toFixed(1)}%

🔥 Chuỗi: ${d.streakVal} (${d.streak})
📊 TB: ${d.avg.toFixed(2)}
`;
}

</script>

</body>
</html>
