<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Dự đoán Tài Xỉu</title>

<style>
body{
    font-family:Arial;
    background:#f4f4f4;
    text-align:center;
    padding:30px;
}
.container{
    background:#fff;
    width:500px;
    margin:auto;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}
input{
    width:90%;
    padding:10px;
    margin:10px;
}
button{
    padding:10px 20px;
    cursor:pointer;
}
.result{
    margin-top:20px;
    font-size:20px;
    font-weight:bold;
    white-space:pre-line;
}
</style>

</head>

<body>

<div class="container">

<h2>🤖 AI TÀI XỈU (MARKOV + CẦU)</h2>

<p>Nhập kết quả (T hoặc X)</p>

<input id="history" placeholder="Ví dụ: T,X,T,T,X,X,T">

<br>

<button onclick="predict()">Dự đoán</button>

<div class="result" id="result"></div>

</div>

<script>

// ======================
// 🧠 ANALYZE + AI
// ======================
function analyze(arr) {

    let result = {
        tai: 0,
        xiu: 0,
        currentStreak: 0,
        streakType: null,
        longestStreak: 0,
        pattern: "",
        strength: 0,
        alert: "",
        prediction: ""
    };

    if (!arr || arr.length < 2) return result;

    // 📊 ĐẾM
    arr.forEach(v => {
        if (v === "T") result.tai++;
        if (v === "X") result.xiu++;
    });

    // 🔥 CHUỖI HIỆN TẠI
    let last = arr[arr.length - 1];
    let count = 1;

    for (let i = arr.length - 2; i >= 0; i--) {
        if (arr[i] === last) count++;
        else break;
    }

    result.currentStreak = count;
    result.streakType = last;

    // 📈 CHUỖI DÀI NHẤT
    let max = 1, temp = 1;

    for (let i = 1; i < arr.length; i++) {
        if (arr[i] === arr[i - 1]) {
            temp++;
            max = Math.max(max, temp);
        } else temp = 1;
    }

    result.longestStreak = max;

    // ======================
    // 🤖 MARKOV CHAIN AI
    // ======================
    let trans = {
        T: { T: 0, X: 0 },
        X: { T: 0, X: 0 }
    };

    for (let i = 0; i < arr.length - 1; i++) {
        let cur = arr[i];
        let next = arr[i + 1];
        if (trans[cur]) trans[cur][next]++;
    }

    let lastState = arr[arr.length - 1];

    let total = trans[lastState].T + trans[lastState].X;

    let pT = total ? trans[lastState].T / total : 0.5;
    let pX = total ? trans[lastState].X / total : 0.5;

    if (pT > pX) result.prediction = "TÀI (AI Markov)";
    else if (pX > pT) result.prediction = "XỈU (AI Markov)";
    else result.prediction = "50/50";

    // ======================
    // 🧠 CẦU
    // ======================
    let strength = 0;

    if (count >= 4) {
        result.pattern = "🔥 CẦU BỆT " + last;
        strength += count * 15;
    }

    let xenKe = true;
    for (let i = 1; i < arr.length; i++) {
        if (arr[i] === arr[i - 1]) {
            xenKe = false;
            break;
        }
    }

    if (xenKe && arr.length >= 4) {
        result.pattern = "🔁 CẦU 1-1";
        strength += 40;
    }

    if (arr.length >= 8) {
        let ok = true;
        for (let i = 0; i < 4; i++) {
            if (arr[i] !== arr[i + 4]) ok = false;
        }
        if (ok) {
            result.pattern = "🔂 CẦU 2-2";
            strength += 60;
        }
    }

    strength += Math.abs(result.tai - result.xiu) * 5;

    result.strength = strength;

    // 🔔 CẢNH BÁO
    if (strength >= 80) result.alert = "🔴 CẦU RẤT MẠNH";
    else if (strength >= 50) result.alert = "🟠 CẦU MẠNH";
    else if (strength >= 30) result.alert = "🟡 CẦU TB";
    else result.alert = "🟢 CẦU YẾU";

    return result;
}


// ======================
// 🎯 MAIN
// ======================
function predict(){

    let input = document.getElementById("history").value.toUpperCase();

    let arr = input.split(",").map(x => x.trim()).filter(x => x);

    if(arr.length < 3){
        document.getElementById("result").innerHTML =
        "Cần ít nhất 3 phiên.";
        return;
    }

    let s = analyze(arr);

    document.getElementById("result").innerHTML = `
🤖 AI MARKOV + CẦU

🎯 Dự đoán: ${s.prediction}

📊 Tài: ${s.tai} | Xỉu: ${s.xiu}
🔥 Cầu: ${s.pattern}
📈 Độ mạnh: ${s.strength}
🔔 Cảnh báo: ${s.alert}

🔥 Chuỗi hiện tại: ${s.currentStreak} (${s.streakType})
📈 Chuỗi dài nhất: ${s.longestStreak}
`;
}

</script>

</body>
</html>
