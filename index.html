<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>AI Tài Xỉu</title>

<style>
body{
    font-family:Arial;
    background:#0f172a;
    color:white;
    text-align:center;
    padding:30px;
}

.container{
    max-width:600px;
    margin:auto;
    background:#1e293b;
    padding:20px;
    border-radius:15px;
}

button{
    padding:15px 25px;
    margin:10px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.tai{background:#22c55e;}
.xiu{background:#ef4444;}
.undo{background:#64748b;}

.result{
    margin-top:20px;
    font-size:18px;
    white-space:pre-line;
}
</style>

</head>

<body>

<div class="container">

<h2>🤖 AI TÀI XỈU (BUTTON MODE)</h2>

<button class="tai" onclick="add('T')">🎯 TÀI</button>
<button class="xiu" onclick="add('X')">🎲 XỈU</button>
<button class="undo" onclick="undo()">↩️ UNDO</button>

<div class="result" id="result"></div>

</div>

<script>

let history = [];

// =====================
// ➕ ADD
// =====================
function add(num){
    history.push(num);
    train();
    predict();
}

// =====================
// ↩️ UNDO
// =====================
function undo(){
    history.pop();
    predict();
}

// =====================
// 📊 ANALYZE
// =====================
function analyze(arr){

    let result = {
        avg:0,
        min:0,
        max:0,
        currentStreak:0,
        longestStreak:0,
        streakValue:0,
        hotZone:"",
        betType:"NONE",
        stability:0,
        features:{}
    };

    if(arr.length === 0) return result;

    // =====================
    // 📊 BASIC STATS
    // =====================
    let sum = arr.reduce((a,b)=>a+b,0);
    result.avg = sum / arr.length;

    result.min = Math.min(...arr);
    result.max = Math.max(...arr);

    // =====================
    // 🔥 CURRENT STREAK
    // =====================
    let last = arr[arr.length - 1];
    let c = 1;

    for(let i=arr.length-2;i>=0;i--){
        if(arr[i] === last) c++;
        else break;
    }

    result.currentStreak = c;
    result.streakValue = last;

    // =====================
    // 📈 LONGEST STREAK
    // =====================
    let m=1,t=1;
    for(let i=1;i<arr.length;i++){
        if(arr[i]===arr[i-1]){
            t++;
            m=Math.max(m,t);
        }else t=1;
    }

    result.longestStreak = m;

    // =====================
    // 🔥 DETECT "BỆT"
    // =====================
    if(m >= 4){
        result.betType = "BỆT MẠNH";
    }
    else if(m === 3){
        result.betType = "BỆT NHẸ";
    }
    else{
        result.betType = "KHÔNG BỆT";
    }

    // =====================
    // 📊 HOT ZONE
    // =====================
    let low=0, mid=0, high=0;

    arr.forEach(v=>{
        if(v<=9) low++;
        else if(v<=13) mid++;
        else high++;
    });

    if(low>mid && low>high) result.hotZone="LOW (3-9)";
    else if(mid>low && mid>high) result.hotZone="MID (10-13)";
    else result.hotZone="HIGH (14-18)";

    // =====================
    // 📉 STABILITY (KHÔNG NHẢY LUNG TUNG)
    // =====================
    let diff = 0;

    for(let i=1;i<arr.length;i++){
        diff += Math.abs(arr[i]-arr[i-1]);
    }

    let rawStability = 1 - (diff / (arr.length * 15));

    // smoothing để không nhảy lung tung
    result.stability = Math.max(0, Math.min(1, rawStability));

    // =====================
    // FEATURES FOR AI
    // =====================
    result.features = {
        avg: result.avg/18,
        streak: result.currentStreak/10,
        volatility: (result.max - result.min)/18,
        stability: result.stability
    };

    return result;
}

// =====================
// 🤖 NEURAL NETWORK
// =====================
let weights = {
    avg: Math.random(),
    streak: Math.random(),
    volatility: Math.random(),
    stability: Math.random()
};

let bias = Math.random();

function sigmoid(x){
    return 1 / (1 + Math.exp(-x));
}

// =====================
// 🧠 AI OUTPUT
// =====================
function neuralOutput(f){

    let score =
        f.avg * weights.avg +
        f.streak * weights.streak +
        f.volatility * weights.volatility +
        f.stability * weights.stability +
        bias;

    return sigmoid(score);
}

// =====================
// 🧠 TRAIN (SMOOTH LEARNING)
// =====================
function train(){

    if(history.length < 6) return;

    let data = analyze(history.slice(0,-1));
    let target = history[history.length-1] / 18;

    let out = neuralOutput(data.features);

    let error = target - out;

    let lr = 0.005; // nhỏ hơn để ổn định

    weights.avg += lr * error * data.features.avg;
    weights.streak += lr * error * data.features.streak;
    weights.volatility += lr * error * data.features.volatility;
    weights.stability += lr * error * data.features.stability;

    bias += lr * error;
}

// =====================
// 🎯 PREDICT
// =====================
function predict(){

    if(history.length < 3){
        document.getElementById("result").innerText =
        "Cần ít nhất 3 số";
        return;
    }

    let data = analyze(history);

    let prob = neuralOutput(data.features);

    // 📊 ổn định % (không nhảy lung tung)
    let stableProb = prob * 0.7 + (data.stability * 0.3);

    let predicted = Math.round(3 + stableProb * 15);

    document.getElementById("result").innerText = `
📊 LỊCH SỬ: ${history.join(" ")}

🤖 AI NEURAL (STABLE MODE)

🎯 Dự đoán: ${predicted}
📈 Xác suất ổn định: ${(stableProb*100).toFixed(2)}%

🔥 Bệt: ${data.betType} (max streak: ${data.longestStreak})
📊 Stability: ${(data.stability*100).toFixed(1)}%

🔥 Chuỗi hiện tại: ${data.streakValue} (${data.currentStreak})

📊 Hot zone: ${data.hotZone}
`;
}

</script>

</body>
</html>
