<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Markov Multi-Layer Analyzer</title>

<style>
body{
    margin:0;
    font-family:Segoe UI;
    background:radial-gradient(circle at top,#1f2937,#0b1220);
    color:white;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:20px;
}

h1{text-align:center;}

.card{
    background:rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:16px;
    padding:15px;
    margin-bottom:15px;
}

.buttons{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

button{
    padding:10px 14px;
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
}

.b{background:#ef4444;color:#fff;}
.p{background:#3b82f6;color:#fff;}
.t{background:#10b981;color:#fff;}
.gray{background:#6b7280;color:#fff;}

.tabs{
    display:flex;
    gap:10px;
    margin-bottom:10px;
}

.tab{
    padding:8px 12px;
    border-radius:10px;
    background:#374151;
    cursor:pointer;
}

.tab.active{
    background:#6366f1;
}

.road{
    display:grid;
    grid-template-columns:repeat(20,1fr);
    gap:4px;
}

.dot{
    width:18px;
    height:18px;
    border-radius:50%;
}

.B{background:#ef4444;}
.P{background:#3b82f6;}
.T{background:#10b981;}

table{
    width:100%;
    border-collapse:collapse;
}

td,th{
    border:1px solid rgba(255,255,255,0.2);
    padding:8px;
    text-align:center;
}
</style>

</head>

<body>

<div class="container">

<h1>📊 Markov Multi-Layer (1–3)</h1>

<div class="card">
<div class="buttons">
<button class="b" onclick="add('B')">Banker</button>
<button class="p" onclick="add('P')">Player</button>
<button class="t" onclick="add('T')">Tie</button>
<button class="gray" onclick="undo()">Undo</button>
<button class="gray" onclick="clearAll()">Clear</button>
</div>
</div>

<div class="card">
<h3>📜 History</h3>
<div id="history"></div>
</div>

<div class="card">
<h3>🔥 Road Map</h3>
<div id="road" class="road"></div>
</div>

<div class="card">

<h3>📈 Markov Layers</h3>

<div class="tabs">
<div class="tab active" onclick="setLayer(1)">Layer 1</div>
<div class="tab" onclick="setLayer(2)">Layer 2</div>
<div class="tab" onclick="setLayer(3)">Layer 3</div>
</div>

<table>
<thead>
<tr>
<th>From</th>
<th>B</th>
<th>P</th>
<th>T</th>
</tr>
</thead>
<tbody id="matrix"></tbody>
</table>

</div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("markov_multi")) || [];
let layer = 1;

function save(){
    localStorage.setItem("markov_multi", JSON.stringify(data));
}

function add(v){
    data.push(v);
    save();
    render();
}

function undo(){
    data.pop();
    save();
    render();
}

function clearAll(){
    if(confirm("Clear all?")){
        data = [];
        save();
        render();
    }
}

function setLayer(l){
    layer = l;
    document.querySelectorAll(".tab").forEach((t,i)=>{
        t.classList.toggle("active", i===l-1);
    });
    render();
}

function buildMatrix(order){

    let states = ["B","P","T"];
    let m = {};

    for(let a of states){
        m[a] = {};
        for(let b of states){
            m[a][b] = 0;
        }
    }

    for(let i=0;i<data.length-order;i++){
        let from = data[i];
        let to = data[i+order];

        if(m[from] && m[from][to] !== undefined){
            m[from][to]++;
        }
    }

    return m;
}

function normalize(row){
    let sum = Object.values(row).reduce((a,b)=>a+b,0);

    let out = {};
    for(let k in row){
        out[k] = sum ? ((row[k]/sum)*100).toFixed(1)+"%" : "0%";
    }
    return out;
}

function renderMatrix(){

    let m = buildMatrix(layer);

    let html = "";

    for(let from of ["B","P","T"]){

        let n = normalize(m[from]);

        html += `
        <tr>
            <td>${from}</td>
            <td>${n.B}</td>
            <td>${n.P}</td>
            <td>${n.T}</td>
        </tr>
        `;
    }

    document.getElementById("matrix").innerHTML = html;
}

function renderHistory(){
    document.getElementById("history").innerText = data.join(" ");
}

function renderRoad(){

    let el = document.getElementById("road");
    el.innerHTML = "";

    data.forEach(v=>{
        let d = document.createElement("div");
        d.className = "dot " + v;
        el.appendChild(d);
    });

}

function render(){
    renderHistory();
    renderRoad();
    renderMatrix();
}

render();

</script>

</body>
</html>
