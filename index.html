<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>TX FLOAT</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  overflow:hidden;
  background:#111;
}

/* GAME */

#game{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  border:none;
}

/* FLOAT MENU */

#menu{

  position:fixed;

  top:100px;
  left:10px;

  width:170px;

  background:#ffc400;

  border:2px solid #111;

  border-radius:16px;

  padding:10px;

  z-index:99999;

  box-shadow:
  0 4px 10px rgba(0,0,0,.4);

  user-select:none;

  touch-action:none;
}

/* HEADER */

.header{

  display:flex;

  justify-content:space-between;

  align-items:center;

  font-size:16px;

  font-weight:bold;

  margin-bottom:8px;

  cursor:move;
}

/* RESULT */

.result{

  text-align:center;

  font-size:24px;

  font-weight:bold;

  margin:8px 0;

  color:#111;
}

/* PREDICT */

.predict{

  background:#111;

  color:#00ff90;

  padding:10px;

  border-radius:10px;

  text-align:center;

  font-size:15px;

  font-weight:bold;

  min-height:45px;

  display:flex;

  align-items:center;

  justify-content:center;

  white-space:nowrap;

  overflow:hidden;

  box-shadow:
  0 0 10px #00ff90;
}

/* BUTTON */

.btn{

  width:100%;

  border:none;

  border-radius:10px;

  height:36px;

  margin-top:8px;

  font-size:13px;

  font-weight:bold;
}

.open{
  background:#00c853;
  color:white;
}

.hide{
  background:#ff3b30;
  color:white;
}

/* INFO */

.info{

  margin-top:8px;

  background:white;

  border-radius:10px;

  padding:6px;

  color:#111;

  font-size:12px;

  line-height:1.5;
}

/* HISTORY */

.history{

  display:flex;

  flex-wrap:wrap;

  gap:4px;

  margin-top:8px;
}

.item{

  width:24px;
  height:24px;

  border-radius:50%;

  display:flex;

  align-items:center;

  justify-content:center;

  color:white;

  font-size:12px;

  font-weight:bold;
}

.tai{
  background:#ff3b30;
}

.xiu{
  background:#007aff;
}

</style>
</head>
<body>

<!-- GAME -->

<iframe
id="game"
src="https://play.sum.vin/">
</iframe>

<!-- FLOAT -->

<div id="menu">

  <div class="header">

    <span id="session">
      #0000
    </span>

    <span onclick="hideFloat()">
      ✕
    </span>

  </div>

  <div class="result"
  id="result">
    ...
  </div>

  <div class="predict"
  id="predict">
    ĐANG PHÂN TÍCH
  </div>

  <button
  class="btn open"
  onclick="location.reload()">

    REFRESH

  </button>

  <button
  class="btn hide"
  onclick="hideFloat()">

    ẨN MENU

  </button>

  <div class="info"
  id="info">

    ĐANG TẢI...

  </div>

  <div class="history"
  id="history"></div>

</div>

<script>

// ===================
// API
// ===================

const API =
"https://cricket-compressed-list-suppose.trycloudflare.com/api/md5";

// ===================
// DATA
// ===================

let historyData =
JSON.parse(
localStorage.getItem("tx")
) || [];

let lastSession = null;

// ===================
// NORMALIZE
// ===================

function normalizeResult(text){

  if(!text) return "";

  text = text
  .toString()
  .toLowerCase();

  if(
    text.includes("tài")
    || text.includes("tai")
  ){
    return "tai";
  }

  return "xiu";
}

// ===================
// GET API
// ===================

async function getData(){

  try{

    let res =
    await fetch(API);

    let text =
    await res.text();

    let data =
    JSON.parse(text);

    if(
      data.phien === lastSession
    ){
      return;
    }

    lastSession =
    data.phien;

    updateUI(data);

  }catch(err){

    console.log(err);

    document
    .getElementById("predict")
    .innerHTML =
    "LỖI API";
  }
}

// ===================
// UPDATE UI
// ===================

function updateUI(data){

  // SESSION

  document
  .getElementById("session")
  .innerHTML =
  "#" + data.phien;

  // RESULT

  let result =
  normalizeResult(
    data.ket_qua
  );

  document
  .getElementById("result")
  .innerHTML =
  result==="tai"
  ? "TÀI"
  : "XỈU";

  // HISTORY

  historyData.push(result);

  if(historyData.length > 20){

    historyData.shift();

  }

  localStorage.setItem(
    "tx",
    JSON.stringify(historyData)
  );

  renderHistory();

  // PREDICT

  let next =
  analyze();

  document
  .getElementById("predict")
  .innerHTML =
  "DỰ ĐOÁN "
  + next;

  // INFO

  document
  .getElementById("info")
  .innerHTML = `

  🎲 ${data.xuc_xac_1}
  - ${data.xuc_xac_2}
  - ${data.xuc_xac_3}

  <br>

  Tổng:
  ${data.tong}

  <br>

  👤 Tài:
  ${data.total_tai}

  <br>

  👤 Xỉu:
  ${data.total_xiu}

  <br>

  💰 Tài:
  ${Number(
    data.total_bet_tai
  ).toLocaleString()}

  <br>

  💰 Xỉu:
  ${Number(
    data.total_bet_xiu
  ).toLocaleString()}

  <br>

  🕒 ${data.update_at}

  `;
}

// ===================
// HISTORY
// ===================

function renderHistory(){

  let html = "";

  historyData
  .slice()
  .reverse()
  .forEach(item=>{

    html += `

    <div class="
    item ${item}">

    ${item==="tai"
    ?"T":"X"}

    </div>

    `;

  });

  document
  .getElementById("history")
  .innerHTML = html;
}

// ===================
// AI
// ===================

function analyze(){

  if(historyData.length <= 1){

    return "ĐANG HỌC";

  }

  let last10 =
  historyData.slice(-10);

  let tai = 0;
  let xiu = 0;

  last10.forEach(item=>{

    if(item==="tai"){

      tai++;

    }else{

      xiu++;

    }

  });

  if(tai > xiu){

    return "XỈU";

  }

  if(xiu > tai){

    return "TÀI";

  }

  return Math.random() > 0.5
  ? "TÀI"
  : "XỈU";
}

// ===================
// HIDE
// ===================

function hideFloat(){

  document
  .getElementById("menu")
  .style.display =
  "none";
}

// ===================
// DRAG MOBILE + PC
// ===================

const menu =
document.getElementById("menu");

let isDragging = false;

let offsetX = 0;
let offsetY = 0;

// MOBILE

menu.addEventListener(
"touchstart",
e=>{

  isDragging = true;

  offsetX =
  e.touches[0].clientX
  - menu.offsetLeft;

  offsetY =
  e.touches[0].clientY
  - menu.offsetTop;
});

document.addEventListener(
"touchmove",
e=>{

  if(!isDragging) return;

  menu.style.left =
  (e.touches[0].clientX
  - offsetX)
  + "px";

  menu.style.top =
  (e.touches[0].clientY
  - offsetY)
  + "px";
});

document.addEventListener(
"touchend",
()=>{

  isDragging = false;

});

// PC

menu.addEventListener(
"mousedown",
e=>{

  isDragging = true;

  offsetX =
  e.clientX
  - menu.offsetLeft;

  offsetY =
  e.clientY
  - menu.offsetTop;
});

document.addEventListener(
"mousemove",
e=>{

  if(!isDragging) return;

  menu.style.left =
  (e.clientX-offsetX)
  + "px";

  menu.style.top =
  (e.clientY-offsetY)
  + "px";
});

document.addEventListener(
"mouseup",
()=>{

  isDragging = false;

});

// ===================
// AUTO
// ===================

getData();

setInterval(()=>{

  getData();

},3000);

</script>

</body>
</html>
