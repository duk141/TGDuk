<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>AI Tài Xỉu 3-18</title>

<style>
body{
    font-family:Arial;
    background:#050816;
    color:white;
    text-align:center;
    padding:30px;
}

/* 💡 LED CONTAINER */
.container{
    max-width:650px;
    margin:auto;
    padding:25px;
    border-radius:18px;

    background:#0f172a;

    border:2px solid #00f5ff;
    box-shadow:
        0 0 10px #00f5ff,
        0 0 20px #00f5ff,
        0 0 40px #00f5ff;
    animation: glow 2s infinite alternate;
}

@keyframes glow{
    from{box-shadow:0 0 10px #00f5ff;}
    to{box-shadow:0 0 25px #ff00ff;}
}

button{
    padding:12px 16px;
    margin:4px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    background:#1e293b;
    color:white;
}

button:hover{
    background:#334155;
}

.result{
    margin-top:20px;
    font-size:16px;
    white-space:pre-line;
    text-align:left;
}
</style>
</head>

<body>

<div class="container">

<h2>🤖 AI TÀI XỈU (3-18)</h2>

<div id="buttons"></div>

<br>
<button onclick="undo()">↩️ UNDO</button>

<div class="result" id="result"></div>

</div>

<script>

let history = [];

// =====================
// ➕ INPUT
// =====================
function add(n){
    history.push(n);
    train();
    predict();
}

function undo(){
    history.pop();
    predict();
}

// =====================
// 📊 ANALYZE
// =====================
function analyze(arr){

    let r={
        avg:0,
        streak:0,
        longest:0,
        stability:0,
        volatility:0
    };

    if(arr.length===0) return r;

    r.avg = arr.reduce((a,b)=>a+b,0)/arr.length;

    let last=arr[arr.length-1];
    let c=1;

    for(let i=arr.length-2;i>=0;i--){
        if(arr[i]===last) c++;
        else break;
    }

    r.streak=c;

    let m=1,t=1;
    for(let i=1;i<arr.length;i++){
        if(arr[i]===arr[i-1]){
            t++;
            m=Math.max(m,t);
        }else t=1;
    }

    r.longest=m;

    let diff=0;
    for(let i=1;i<arr.length;i++){
        diff+=Math.abs(arr[i]-arr[i-1]);
    }

    r.stability = 1 - diff/(arr.length*15);
    r.stability = Math.max(0,Math.min(1,r.stability));

    r.volatility = (Math.max(...arr)-Math.min(...arr))/18;

    return r;
}

// =====================
// 🔁 MARKOV 5
// =====================
let markov = {};

function getKey(arr){
    return arr.slice(-5).join(",");
}

function trainMarkov(){
    if(history.length<6) return;

    for(let i=5;i<history.length;i++){
        let key = history.slice(i-5,i).join(",");
        let next = history[i];

        if(!markov[key]) markov[key]={sum:0,count:0};

        markov[key].sum += next;
        markov[key].count++;
    }
}

function predictMarkov(){
    let key = getKey(history);
    if(!markov[key]) return 0.5;

    return (markov[key].sum / markov[key].count)/18;
}

// =====================
// 🤖 NEURAL NETWORK (OLD VIP)
// =====================
let w={
    avg:Math.random(),
    streak:Math.random(),
    stab:Math.random()
};
let b=Math.random();

function sigmoid(x){return 1/(1+Math.exp(-x));}

function neural(f){
    return sigmoid(
        f.avg*w.avg +
        f.streak*w.streak +
        f.stab*w.stab +
        b
    );
}

// =====================
// 🧠 DEEP LEARNING (MLP 3 LỚP)
// =====================

// layer 1 (3 → 6)
let W1 = Array(6).fill().map(()=>Array(3).fill().map(()=>Math.random()));
let B1 = Array(6).fill().map(()=>Math.random());

// layer 2 (6 → 4)
let W2 = Array(4).fill().map(()=>Array(6).fill().map(()=>Math.random()));
let B2 = Array(4).fill().map(()=>Math.random());

// output (4 → 1)
let W3 = Array(4).fill().map(()=>Math.random());
let B3 = Math.random();

function relu(x){return Math.max(0,x);}

function mlp(f){

    let input=[f.avg/18, f.streak/10, f.stability];

    // layer 1
    let h1=[];
    for(let i=0;i<6;i++){
        let s=B1[i];
        for(let j=0;j<3;j++) s+=input[j]*W1[i][j];
        h1[i]=relu(s);
    }

    // layer 2
    let h2=[];
    for(let i=0;i<4;i++){
        let s=B2[i];
        for(let j=0;j<6;j++) s+=h1[j]*W2[i][j];
        h2[i]=relu(s);
    }

    // output
    let out=B3;
    for(let i=0;i<4;i++) out+=h2[i]*W3[i];

    return sigmoid(out);
}

// =====================
// 📊 HEATMAP 3–18
// =====================
function heatmap(arr){

    let freq = Array(19).fill(0);

    arr.forEach(v=>freq[v]++);

    let max = Math.max(...freq);

    let text="🔥 HEATMAP 3–18\n\n";

    for(let i=3;i<=18;i++){

        let bar = "█".repeat(Math.round((freq[i]/max)*10));

        text += `${i}: ${bar} (${freq[i]})\n`;
    }

    return text;
}

// =====================
// 🔥 ĐẢO CẦU DETECTION
// =====================
function reverseAlert(arr){

    if(arr.length<10) return "🟢 CHƯA ĐỦ DỮ LIỆU";

    let last6 = arr.slice(-6);

    let up=0,down=0;

    for(let i=1;i<last6.length;i++){
        if(last6[i]>last6[i-1]) up++;
        if(last6[i]<last6[i-1]) down++;
    }

    let vol=0;
    for(let i=1;i<last6.length;i++){
        vol+=Math.abs(last6[i]-last6[i-1]);
    }

    let avg = last6.reduce((a,b)=>a+b,0)/last6.length;

    if(vol>25 || (up>=4 && down>=4)){
        return "🔴 CẢNH BÁO: ĐẢO CẦU SẮP XẢY RA";
    }

    if(avg>12 && down>up){
        return "🟠 NGHI ĐẢO GIẢM";
    }

    if(avg<9 && up>down){
        return "🟠 NGHI ĐẢO TĂNG";
    }

    return "🟢 ỔN ĐỊNH";
}

// =====================
// 🧠 TRAIN VIP (ENSEMBLE + MLP)
// =====================
function train(){

    if(history.length<8) return;

    trainMarkov();

    let d = analyze(history.slice(0,-1));

    let target = history[history.length-1]/18;

    let nn = neural(d);
    let mk = predictMarkov();
    let deep = mlp(d);

    let final = (nn*0.3 + mk*0.3 + deep*0.4);

    let err = target - final;

    let lr = 0.002;

    w.avg += lr*err*(d.avg/18);
    w.streak += lr*err*(d.streak/10);
    w.stab += lr*err*d.stability;
    b += lr*err;
}

// =====================
// 🎯 PREDICT VIP FINAL
// =====================
function predict(){

    if(history.length<6){
        document.getElementById("result").innerText="Cần ít nhất 6 số";
        return;
    }

    let d = analyze(history);

    let nn = neural(d);
    let mk = predictMarkov();
    let deep = mlp(d);

    // ⚡ ENSEMBLE VIP
    let final = (nn*0.3 + mk*0.3 + deep*0.4);

    // smoothing
    final = final*0.7 + d.stability*0.3;

    let predicted = Math.round(3 + final*15);

    document.getElementById("result").innerText=`
⚡ VIP AI ULTIMATE SYSTEM

📊 Lịch sử: ${history.join(" ")}

🎯 Dự đoán: ${predicted}
📈 %: ${(final*100).toFixed(2)}%

🔥 Bệt: ${d.streak} (max ${d.longest})
📊 Stability: ${(d.stability*100).toFixed(1)}%

🤖 Neural: ${nn.toFixed(3)}
🔁 Markov5: ${mk.toFixed(3)}
🧠 Deep MLP: ${deep.toFixed(3)}

${reverseAlert(history)}

${heatmap(history)}
`;
}

</script>

</body>
</html>
