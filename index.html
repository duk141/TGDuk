<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>AI Tài Xỉu</title>

<style>
body{
    font-family:Arial;
    background:#0f172a;
    color:white;
    text-align:center;
    padding:30px;
}

.container{
    max-width:600px;
    margin:auto;
    background:#1e293b;
    padding:20px;
    border-radius:15px;
}

button{
    padding:15px 25px;
    margin:10px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.tai{background:#22c55e;}
.xiu{background:#ef4444;}
.undo{background:#64748b;}

.result{
    margin-top:20px;
    font-size:18px;
    white-space:pre-line;
}
</style>

</head>

<body>

<div class="container">

<h2>🤖 AI TÀI XỈU (BUTTON MODE)</h2>

<button class="tai" onclick="add('T')">🎯 TÀI</button>
<button class="xiu" onclick="add('X')">🎲 XỈU</button>
<button class="undo" onclick="undo()">↩️ UNDO</button>

<div class="result" id="result"></div>

</div>

<script>

let history = [];

// =====================
// 🧠 NEURAL WEIGHTS
// =====================
let weights = {
    streak: Math.random(),
    balance: Math.random(),
    transition: Math.random()
};

let bias = Math.random();

// =====================
// ➕ ADD
// =====================
function add(v){
    history.push(v);
    train();
    predict();
}

// =====================
// ↩️ UNDO
// =====================
function undo(){
    history.pop();
    predict();
}

// =====================
// 🧠 ANALYZE
// =====================
function analyze(arr){

    let result = {
        tai:0,
        xiu:0,
        streak:0,
        streakType:"",
        longest:0,
        pattern:"",
        score:0,
        prediction:""
    };

    if(arr.length === 0) return result;

    // 📊 đếm
    arr.forEach(v=>{
        if(v==="T") result.tai++;
        if(v==="X") result.xiu++;
    });

    // 🔥 chuỗi hiện tại
    let last = arr[arr.length-1];
    let c=1;

    for(let i=arr.length-2;i>=0;i--){
        if(arr[i]===last) c++;
        else break;
    }

    result.streak = c;
    result.streakType = last;

    // 📈 longest
    let m=1,t=1;
    for(let i=1;i<arr.length;i++){
        if(arr[i]===arr[i-1]){
            t++;
            m=Math.max(m,t);
        }else t=1;
    }

    result.longest = m;

    // 🧠 feature score
    let balance = Math.abs(result.tai - result.xiu) / (arr.length || 1);

    let transition = 0;
    for(let i=1;i<arr.length;i++){
        if(arr[i]!==arr[i-1]) transition++;
    }
    transition = transition / (arr.length || 1);

    result.features = {
        streak: result.streak / 10,
        balance: balance,
        transition: transition
    };

    return result;
}

// =====================
// 🤖 NEURAL PREDICT
// =====================
function neuralOutput(features){

    let sum =
        features.streak * weights.streak +
        features.balance * weights.balance +
        features.transition * weights.transition +
        bias;

    return 1 / (1 + Math.exp(-sum)); // sigmoid
}

// =====================
// 🧠 TRAIN (SELF LEARN)
// =====================
function train(){

    if(history.length < 5) return;

    let data = analyze(history.slice(0,-1));
    let target = history[history.length-1] === "T" ? 1 : 0;

    let out = neuralOutput(data.features);

    let error = target - out;

    let lr = 0.05;

    // update weights
    weights.streak += lr * error * data.features.streak;
    weights.balance += lr * error * data.features.balance;
    weights.transition += lr * error * data.features.transition;
    bias += lr * error;
}

// =====================
// 🎯 PREDICT
// =====================
function predict(){

    if(history.length < 3){
        document.getElementById("result").innerText =
        "Cần ít nhất 3 phiên";
        return;
    }

    let data = analyze(history);

    let prob = neuralOutput(data.features);

    let prediction = prob > 0.5 ? "TÀI (NN)" : "XỈU (NN)";

    let confidence = Math.abs(prob - 0.5) * 200;

    document.getElementById("result").innerText = `
📊 LỊCH SỬ: ${history.join(" ")}

🤖 NEURAL NETWORK
🎯 Dự đoán: ${prediction}
📈 Xác suất Tài: ${(prob*100).toFixed(1)}%

🔥 Cầu: ${data.streakType} (${data.streak})
📊 Tài: ${data.tai} | Xỉu: ${data.xiu}

🧠 Confidence: ${confidence.toFixed(1)}%
`;
}

</script>

</body>
</html>
