<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>TX FLOAT</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  overflow:hidden;
  background:#111;
}

/* GAME */

#game{

  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  border:none;
}

/* MENU FLOAT */

#menu{

  position:fixed;

  top:100px;
  left:10px;

  width:150px;

  background:#ffc400;

  border:2px solid #111;

  border-radius:16px;

  padding:10px;

  z-index:99999;

  box-shadow:
  0 4px 10px rgba(0,0,0,.4);

  user-select:none;

  touch-action:none;
}

/* HEADER */

.header{

  display:flex;

  justify-content:space-between;

  align-items:center;

  font-size:16px;

  font-weight:bold;

  margin-bottom:8px;

  cursor:move;
}

/* RESULT */

.result{

  text-align:center;

  font-size:22px;

  font-weight:bold;

  margin:8px 0;
}

/* PREDICT */

.predict{

  background:#111;

  color:white;

  padding:8px;

  border-radius:10px;

  text-align:center;

  font-size:16px;

  font-weight:bold;
}

/* HISTORY */

.history{

  display:flex;

  flex-wrap:wrap;

  gap:4px;

  margin-top:8px;
}

.item{

  width:24px;
  height:24px;

  border-radius:50%;

  display:flex;

  align-items:center;

  justify-content:center;

  color:white;

  font-size:12px;

  font-weight:bold;
}

.tai{
  background:#ff3b30;
}

.xiu{
  background:#007aff;
}

</style>
</head>
<body>

<!-- GAME -->

<iframe
id="game"
src="https://play.lc79.bet/">
</iframe>

<!-- FLOAT -->

<div id="menu">

  <div class="header">

    <span id="session">
      #0000
    </span>

    <span onclick="toggleMenu()">
      ✕
    </span>

  </div>

  <div class="result"
  id="result">

    ...

  </div>

  <div class="predict"
  id="predict">

    PHÂN TÍCH...

  </div>

  <button
  class="btn open"
  onclick="location.reload()">

    REFRESH

  </button>

  <button
  class="btn hide"
  onclick="hideFloat()">

    ẨN MENU

  </button>

  <div class="history"
  id="history"></div>

</div>

<script>

// ===================
// API
// ===================

const API =
"https://strategy-cube-vinyl-warcraft.trycloudflare.com/api/txmd5";

// ===================
// DATA
// ===================

let historyData = [];

let lastSession = null;

// ===================
// NORMALIZE
// ===================

function normalizeResult(text){

  if(!text) return "";

  text = text
  .toString()
  .toLowerCase();

  if(
    text.includes("tài")
    || text.includes("tai")
  ){
    return "tai";
  }

  return "xiu";
}

// ===================
// GET API
// ===================

async function getData(){

  try{

    let res =
    await fetch(API);

    let data =
    await res.json();

    // chống lặp phiên

    if(
      data.phien === lastSession
    ){
      return;
    }

    lastSession =
    data.phien;

    updateUI(data);

  }catch(err){

    console.log(err);

  }
}

// ===================
// UPDATE UI
// ===================

function updateUI(data){

  // SESSION

  document
  .getElementById("session")
  .innerHTML =
  "#" + data.phien;

  // RESULT

  let result =
  normalizeResult(
    data.ket_qua
  );

  document
  .getElementById("result")
  .innerHTML =
  result === "tai"
  ? "TÀI"
  : "XỈU";

  // HISTORY

  historyData.push(result);

  if(historyData.length > 20){

    historyData.shift();

  }

  renderHistory();

  // PREDICT

  let next =
  analyze();

  document
  .getElementById("predict")
  .innerHTML =
  "DỰ ĐOÁN "
  + next;
}

// ===================
// HISTORY
// ===================

function renderHistory(){

  let html = "";

  historyData
  .slice()
  .reverse()
  .forEach(item=>{

    html += `

    <div class="
    item ${item}">

    ${item==="tai"
    ?"T":"X"}

    </div>

    `;

  });

  document
  .getElementById("history")
  .innerHTML = html;
}

// ===================
// AI
// ===================

function analyze(){

  if(historyData.length < 5){

    return "...";

  }

  // 10 phiên gần

  let last10 =
  historyData.slice(-10);

  let tai = 0;
  let xiu = 0;

  last10.forEach(item=>{

    if(item==="tai"){

      tai++;

    }else{

      xiu++;

    }

  });

  // cầu đảo

  return tai > xiu
  ? "XỈU"
  : "TÀI";
}

// ===================
// HIDE
// ===================

function hideFloat(){

  document
  .getElementById("menu")
  .style.display =
  "none";
}

// ===================
// DRAG MOBILE + PC
// ===================

const menu =
document.getElementById("menu");

let isDragging = false;

let offsetX = 0;
let offsetY = 0;

// MOBILE

menu.addEventListener(
"touchstart",
e=>{

  isDragging = true;

  offsetX =
  e.touches[0].clientX
  - menu.offsetLeft;

  offsetY =
  e.touches[0].clientY
  - menu.offsetTop;
});

document.addEventListener(
"touchmove",
e=>{

  if(!isDragging) return;

  menu.style.left =
  (e.touches[0].clientX
  - offsetX)
  + "px";

  menu.style.top =
  (e.touches[0].clientY
  - offsetY)
  + "px";
});

document.addEventListener(
"touchend",
()=>{

  isDragging = false;

});

// PC

menu.addEventListener(
"mousedown",
e=>{

  isDragging = true;

  offsetX =
  e.clientX
  - menu.offsetLeft;

  offsetY =
  e.clientY
  - menu.offsetTop;
});

document.addEventListener(
"mousemove",
e=>{

  if(!isDragging) return;

  menu.style.left =
  (e.clientX-offsetX)
  + "px";

  menu.style.top =
  (e.clientY-offsetY)
  + "px";
});

document.addEventListener(
"mouseup",
()=>{

  isDragging = false;

});

// ===================
// AUTO
// ===================

getData();

setInterval(()=>{

  getData();

},3000);

</script>

</body>
</html>
