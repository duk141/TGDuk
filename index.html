<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>TX FLOAT</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  overflow:hidden;
  background:#111;
}

/* GAME */

#game{

  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  border:none;
}

/* MENU FLOAT */

#menu{

  position:fixed;

  top:120px;
  right:10px;

  width:220px;

  background:#ffc400;

  border-radius:20px;

  padding:15px;

  border:3px solid #111;

  z-index:99999;

  box-shadow:
  0 5px 20px rgba(0,0,0,.5);

}

/* HEADER */

.header{

  display:flex;

  justify-content:space-between;

  align-items:center;

  margin-bottom:10px;

  font-size:22px;

  font-weight:bold;
}

/* RESULT */

.result{

  text-align:center;

  font-size:32px;

  font-weight:bold;

  margin:15px 0;
}

/* PREDICT */

.predict{

  background:#111;

  color:#fff;

  padding:12px;

  border-radius:12px;

  text-align:center;

  font-size:24px;

  margin-top:10px;
}

/* BTN */

.btn{

  width:100%;

  height:45px;

  border:none;

  border-radius:12px;

  font-size:20px;

  margin-top:10px;

  font-weight:bold;
}

.open{
  background:#00c853;
  color:white;
}

.hide{
  background:#ff3b30;
  color:white;
}

/* HISTORY */

.history{

  display:flex;

  flex-wrap:wrap;

  gap:5px;

  margin-top:15px;
}

.item{

  width:35px;
  height:35px;

  border-radius:50%;

  display:flex;

  align-items:center;

  justify-content:center;

  color:white;

  font-weight:bold;
}

.tai{
  background:#ff3b30;
}

.xiu{
  background:#007aff;
}

</style>
</head>
<body>

<!-- GAME -->

<iframe
id="game"
src="https://play.lc79.bet/">
</iframe>

<!-- FLOAT -->

<div id="menu">

  <div class="header">

    <span id="session">
      #0000
    </span>

    <span onclick="toggleMenu()">
      ✕
    </span>

  </div>

  <div class="result"
  id="result">

    ...

  </div>

  <div class="predict"
  id="predict">

    PHÂN TÍCH...

  </div>

  <button
  class="btn open"
  onclick="location.reload()">

    REFRESH

  </button>

  <button
  class="btn hide"
  onclick="hideFloat()">

    ẨN MENU

  </button>

  <div class="history"
  id="history"></div>

</div>

<script>

// ===================
// API
// ===================

const API =
"https://strategy-cube-vinyl-warcraft.trycloudflare.com/api/txmd5";

// ===================
// HISTORY
// ===================

let historyData = [];

// ===================
// GET API
// ===================

async function getData(){

  try{

    let res =
    await fetch(API);

    let data =
    await res.json();

    updateUI(data);

  }catch(err){

    console.log(err);

  }
}

// ===================
// UPDATE UI
// ===================

function updateUI(data){

  document
  .getElementById("session")
  .innerHTML =
  "#" + data.phien;

  document
  .getElementById("result")
  .innerHTML =
  data.ket_qua;

  historyData.push(
    data.ket_qua
  );

  if(historyData.length > 20){

    historyData.shift();

  }

  renderHistory();

  let next =
  analyze();

  document
  .getElementById("predict")
  .innerHTML =
  "DỰ ĐOÁN " + next;
}

// ===================
// HISTORY
// ===================

function renderHistory(){

  let html = "";

  historyData
  .slice()
  .reverse()
  .forEach(item=>{

    html += `

    <div class="
    item
    ${item==="Tài"
    ?"tai":"xiu"}">

    ${item==="Tài"
    ?"T":"X"}

    </div>

    `;

  });

  document
  .getElementById("history")
  .innerHTML = html;
}

// ===================
// AI
// ===================

function analyze(){

  if(historyData.length < 5){

    return "...";

  }

  let tai =
  historyData.filter(
  x=>x==="Tài").length;

  let xiu =
  historyData.filter(
  x=>x==="Xỉu").length;

  return tai > xiu
  ? "XỈU"
  : "TÀI";
}

// ===================
// HIDE
// ===================

function hideFloat(){

  document
  .getElementById("menu")
  .style.display =
  "none";
}

// ===================
// DRAG
// ===================

dragElement(
document.getElementById("menu")
);

function dragElement(elmnt){

  let pos1=0,
      pos2=0,
      pos3=0,
      pos4=0;

  elmnt.onmousedown =
  dragMouseDown;

  function dragMouseDown(e){

    e=e||window.event;

    e.preventDefault();

    pos3=e.clientX;

    pos4=e.clientY;

    document.onmouseup =
    closeDragElement;

    document.onmousemove =
    elementDrag;
  }

  function elementDrag(e){

    e=e||window.event;

    e.preventDefault();

    pos1=pos3-e.clientX;

    pos2=pos4-e.clientY;

    pos3=e.clientX;

    pos4=e.clientY;

    elmnt.style.top =
    (elmnt.offsetTop-pos2)
    + "px";

    elmnt.style.left =
    (elmnt.offsetLeft-pos1)
    + "px";
  }

  function closeDragElement(){

    document.onmouseup=null;

    document.onmousemove=null;
  }
}

// ===================
// AUTO
// ===================

getData();

setInterval(()=>{

  getData();

},3000);

</script>

</body>
</html>
