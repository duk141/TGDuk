<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>AI Tài Xỉu</title>

<style>
body{
    font-family:Arial;
    background:#0f172a;
    color:white;
    text-align:center;
    padding:30px;
}

.container{
    max-width:600px;
    margin:auto;
    background:#1e293b;
    padding:20px;
    border-radius:15px;
}

button{
    padding:15px 25px;
    margin:10px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.tai{background:#22c55e;}
.xiu{background:#ef4444;}
.undo{background:#64748b;}

.result{
    margin-top:20px;
    font-size:18px;
    white-space:pre-line;
}
</style>

</head>

<body>

<div class="container">

<h2>🤖 AI TÀI XỈU (BUTTON MODE)</h2>

<button class="tai" onclick="add('T')">🎯 TÀI</button>
<button class="xiu" onclick="add('X')">🎲 XỈU</button>
<button class="undo" onclick="undo()">↩️ UNDO</button>

<div class="result" id="result"></div>

</div>

<script>

let history = [];

// =====================
// ➕ ADD NUMBER (3-18)
// =====================
function add(num){
    history.push(num);
    train();
    predict();
}

// =====================
// ↩️ UNDO
// =====================
function undo(){
    history.pop();
    predict();
}

// =====================
// 📊 ANALYZE
// =====================
function analyze(arr){

    let result = {
        avg:0,
        min:0,
        max:0,
        longestStreak:0,
        currentStreak:0,
        streakValue:0,
        hotZone:"",
        features:{}
    };

    if(arr.length === 0) return result;

    // 📊 avg
    let sum = arr.reduce((a,b)=>a+b,0);
    result.avg = sum / arr.length;

    result.min = Math.min(...arr);
    result.max = Math.max(...arr);

    // 🔥 current streak
    let last = arr[arr.length-1];
    let c=1;

    for(let i=arr.length-2;i>=0;i--){
        if(arr[i]===last) c++;
        else break;
    }

    result.currentStreak = c;
    result.streakValue = last;

    // 📈 longest streak
    let m=1,t=1;
    for(let i=1;i<arr.length;i++){
        if(arr[i]===arr[i-1]){
            t++;
            m=Math.max(m,t);
        }else t=1;
    }

    result.longestStreak = m;

    // 🔥 hot zone (range)
    let low=0, mid=0, high=0;

    arr.forEach(v=>{
        if(v<=9) low++;
        else if(v<=13) mid++;
        else high++;
    });

    if(low>mid && low>high) result.hotZone="LOW (3-9)";
    else if(mid>low && mid>high) result.hotZone="MID (10-13)";
    else result.hotZone="HIGH (14-18)";

    // features for AI
    result.features = {
        avg: result.avg/18,
        streak: result.currentStreak/10,
        volatility: (result.max - result.min)/18
    };

    return result;
}

// =====================
// 🤖 NEURAL NETWORK
// =====================
let weights = {
    avg: Math.random(),
    streak: Math.random(),
    volatility: Math.random()
};

let bias = Math.random();

// sigmoid
function sigmoid(x){
    return 1 / (1 + Math.exp(-x));
}

// =====================
// 🧠 PREDICT NUMBER
// =====================
function neuralOutput(f){

    let score =
        f.avg * weights.avg +
        f.streak * weights.streak +
        f.volatility * weights.volatility +
        bias;

    return sigmoid(score);
}

// =====================
// 🧠 TRAIN (SELF LEARN)
// =====================
function train(){

    if(history.length < 5) return;

    let data = analyze(history.slice(0,-1));
    let target = history[history.length-1] / 18; // normalize

    let out = neuralOutput(data.features);

    let error = target - out;

    let lr = 0.01;

    weights.avg += lr * error * data.features.avg;
    weights.streak += lr * error * data.features.streak;
    weights.volatility += lr * error * data.features.volatility;

    bias += lr * error;
}

// =====================
// 🎯 PREDICT
// =====================
function predict(){

    if(history.length < 3){
        document.getElementById("result").innerText =
        "Cần ít nhất 3 số (3-18)";
        return;
    }

    let data = analyze(history);

    let prob = neuralOutput(data.features);

    // map ra số 3-18
    let predicted = Math.round(3 + prob * 15);

    document.getElementById("result").innerText = `
📊 LỊCH SỬ: ${history.join(" ")}

🤖 NEURAL AI (3-18)
🎯 Dự đoán: ${predicted}

📈 Xác suất: ${(prob*100).toFixed(1)}%

🔥 Chuỗi: ${data.streakValue} (${data.currentStreak})
📊 Trung bình: ${data.avg.toFixed(2)}
📉 Min/Max: ${data.min} / ${data.max}

🔥 Vùng nóng: ${data.hotZone}
`;
}

</script>

</body>
</html>
