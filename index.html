<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
    background:#101820;
    color:white;
    font-family:sans-serif;
    text-align:center;
    padding-top:40px;
}

.box{
    width:90%;
    margin:auto;
    background:#1b2631;
    border-radius:20px;
    padding:20px;
}

button{

    width:220px;
    height:60px;

    border:none;
    border-radius:15px;

    font-size:22px;

    background:#2ea6ff;
    color:white;
}

#result{
    font-size:40px;
    margin-top:20px;
}

</style>
</head>

<body>

<div class="box">

<h1>🤖 TOOL TELEGRAM</h1>

<button onclick="random()">
🎲 RANDOM
</button>

<div id="result"></div>

</div>

<script>

let tg = window.Telegram.WebApp;

tg.expand();

function random(){

    let n =
    Math.floor(Math.random()*100);

    document.getElementById("result")
    .innerHTML = n;

}

</script>

</body>
</html>
