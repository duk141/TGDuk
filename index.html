<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>AI Tài Xỉu</title>

<style>
body{
    font-family:Arial;
    background:#0f172a;
    color:white;
    text-align:center;
    padding:30px;
}

.container{
    max-width:600px;
    margin:auto;
    background:#1e293b;
    padding:20px;
    border-radius:15px;
}

button{
    padding:15px 25px;
    margin:10px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.tai{background:#22c55e;}
.xiu{background:#ef4444;}
.undo{background:#64748b;}

.result{
    margin-top:20px;
    font-size:18px;
    white-space:pre-line;
}
</style>

</head>

<body>

<div class="container">

<h2>🤖 AI TÀI XỈU (BUTTON MODE)</h2>

<button class="tai" onclick="add('T')">🎯 TÀI</button>
<button class="xiu" onclick="add('X')">🎲 XỈU</button>
<button class="undo" onclick="undo()">↩️ UNDO</button>

<div class="result" id="result"></div>

</div>

<script>

let history = [];

// =====================
// ➕ THÊM KẾT QUẢ
// =====================
function add(v){
    history.push(v);
    predict();
}

// =====================
// ↩️ UNDO
// =====================
function undo(){
    history.pop();
    predict();
}

// =====================
// 🧠 AI ANALYZE
// =====================
function analyze(arr){

    let result = {
        tai:0,
        xiu:0,
        currentStreak:0,
        streakType:null,
        longestStreak:0,
        pattern:"",
        strength:0,
        alert:"",
        prediction:""
    };

    if(arr.length < 1) return result;

    // 📊 ĐẾM
    arr.forEach(v=>{
        if(v==="T") result.tai++;
        if(v==="X") result.xiu++;
    });

    // 🔥 CHUỖI HIỆN TẠI
    let last = arr[arr.length-1];
    let count = 1;

    for(let i=arr.length-2;i>=0;i--){
        if(arr[i]===last) count++;
        else break;
    }

    result.currentStreak = count;
    result.streakType = last;

    // 📈 CHUỖI DÀI NHẤT
    let max=1,temp=1;

    for(let i=1;i<arr.length;i++){
        if(arr[i]===arr[i-1]){
            temp++;
            max=Math.max(max,temp);
        }else temp=1;
    }

    result.longestStreak=max;

    // 🤖 MARKOV SIMPLE
    let trans={
        T:{T:0,X:0},
        X:{T:0,X:0}
    };

    for(let i=0;i<arr.length-1;i++){
        trans[arr[i]][arr[i+1]]++;
    }

    let lastState = arr[arr.length-1];

    let total = trans[lastState].T + trans[lastState].X;

    let pT = total ? trans[lastState].T/total : 0.5;
    let pX = total ? trans[lastState].X/total : 0.5;

    result.prediction = pT > pX ? "TÀI (AI)" : "XỈU (AI)";

    // 🧠 CẦU
    let strength=0;

    if(count>=4){
        result.pattern="🔥 CẦU BỆT "+last;
        strength+=count*15;
    }

    let xenKe=true;
    for(let i=1;i<arr.length;i++){
        if(arr[i]===arr[i-1]) xenKe=false;
    }

    if(xenKe) result.pattern="🔁 CẦU 1-1";

    if(arr.length>=8){
        let ok=true;
        for(let i=0;i<4;i++){
            if(arr[i]!==arr[i+4]) ok=false;
        }
        if(ok){
            result.pattern="🔂 CẦU 2-2";
            strength+=60;
        }
    }

    strength+=Math.abs(result.tai-result.xiu)*5;

    result.strength=strength;

    // 🔔 CẢNH BÁO
    if(strength>=80) result.alert="🔴 RẤT MẠNH";
    else if(strength>=50) result.alert="🟠 MẠNH";
    else if(strength>=30) result.alert="🟡 TB";
    else result.alert="🟢 YẾU";

    return result;
}

// =====================
// 🎯 MAIN
// =====================
function predict(){

    let s = analyze(history);

    document.getElementById("result").innerText = `
📊 LỊCH SỬ: ${history.join(" ")}

🎯 DỰ ĐOÁN: ${s.prediction}

🔥 CẦU: ${s.pattern}
📈 ĐỘ MẠNH: ${s.strength}
🔔 CẢNH BÁO: ${s.alert}

🔥 CHUỖI: ${s.currentStreak} (${s.streakType})
📈 DÀI NHẤT: ${s.longestStreak}
`;
}

</script>

</body>
</html>
