<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Markov + Road Analyzer</title>

<style>
body{
    margin:0;
    font-family:Segoe UI;
    background:radial-gradient(circle at top,#1f2937,#0b1220);
    color:white;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:20px;
}

h1{text-align:center;}

.card{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:16px;
    padding:15px;
    margin-bottom:15px;
}

.buttons{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

button{
    padding:10px 14px;
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
}

.b{background:#ef4444;color:#fff;}
.p{background:#3b82f6;color:#fff;}
.t{background:#10b981;color:#fff;}
.gray{background:#6b7280;color:#fff;}

.road{
    display:grid;
    grid-template-columns:repeat(20,1fr);
    gap:4px;
}

.dot{
    width:18px;
    height:18px;
    border-radius:50%;
}

.B{background:#ef4444;}
.P{background:#3b82f6;}
.T{background:#10b981;}

table{
    width:100%;
    border-collapse:collapse;
}

td,th{
    border:1px solid rgba(255,255,255,0.2);
    padding:8px;
    text-align:center;
}
</style>

</head>

<body>

<div class="container">

<h1>📊 Markov + Road Analyzer PRO</h1>

<div class="card">
<div class="buttons">
<button class="b" onclick="add('B')">Banker</button>
<button class="p" onclick="add('P')">Player</button>
<button class="t" onclick="add('T')">Tie</button>
<button class="gray" onclick="undo()">Undo</button>
<button class="gray" onclick="clearAll()">Clear</button>
</div>
</div>

<div class="card">
<h3>📜 History</h3>
<div id="history"></div>
</div>

<div class="card">
<h3>🔥 Road Map</h3>
<div id="road" class="road"></div>
</div>

<div class="card">
<h3>📊 Phân tích cầu</h3>
<div id="roadAnalysis">Chưa có dữ liệu</div>
</div>

<div class="card">
<h3>📈 Markov bậc 1</h3>
<table>
<thead>
<tr>
<th>From</th>
<th>B</th>
<th>P</th>
<th>T</th>
</tr>
</thead>
<tbody id="matrix"></tbody>
</table>
</div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("data_markov_road")) || [];

function save(){
    localStorage.setItem("data_markov_road", JSON.stringify(data));
}

function add(v){
    data.push(v);
    save();
    render();
}

function undo(){
    data.pop();
    save();
    render();
}

function clearAll(){
    if(confirm("Clear all?")){
        data = [];
        save();
        render();
    }
}

function renderHistory(){
    document.getElementById("history").innerText = data.join(" ");
}

function renderRoad(){

    let el = document.getElementById("road");
    el.innerHTML = "";

    data.forEach(v=>{
        let d = document.createElement("div");
        d.className = "dot " + v;
        el.appendChild(d);
    });
}

/* =========================
   MARKOV 1
========================= */
function buildMatrix(){

    let states = ["B","P","T"];
    let m = {};

    for(let a of states){
        m[a] = {};
        for(let b of states){
            m[a][b] = 0;
        }
    }

    for(let i=0;i<data.length-1;i++){
        let from = data[i];
        let to = data[i+1];

        if(m[from] && m[from][to] !== undefined){
            m[from][to]++;
        }
    }

    return m;
}

function normalize(row){
    let sum = Object.values(row).reduce((a,b)=>a+b,0);

    let out = {};
    for(let k in row){
        out[k] = sum ? ((row[k]/sum)*100).toFixed(1)+"%" : "0%";
    }
    return out;
}

/* =========================
   CẦU DETECT
========================= */
function detectRoad(){

    if(data.length < 3){
        return null;
    }

    let last = data[data.length - 1];
    let streak = 1;

    for(let i=data.length-2;i>=0;i--){
        if(data[i] === last) streak++;
        else break;
    }

    // pattern
    let pattern = "none";

    let last5 = data.slice(-5).join("");

    if(last5 === "BPBPB" || last5 === "PBPBP"){
        pattern = "zigzag";
    }

    if(streak >= 4){
        pattern = "streak";
    }

    // volatility
    let changes = 0;
    for(let i=1;i<data.length;i++){
        if(data[i] !== data[i-1]) changes++;
    }

    let volatility = changes / data.length;

    let score =
        (streak * 12) +
        ((1 - volatility) * 40) +
        (pattern === "zigzag" ? 20 : 0);

    return {
        last,
        streak,
        pattern,
        score: Math.min(100, Math.round(score))
    };
}

/* =========================
   RENDER
========================= */
function renderMatrix(){

    let m = buildMatrix();

    let html = "";

    for(let from of ["B","P","T"]){

        let n = normalize(m[from]);

        html += `
        <tr>
            <td>${from}</td>
            <td>${n.B}</td>
            <td>${n.P}</td>
            <td>${n.T}</td>
        </tr>
        `;
    }

    document.getElementById("matrix").innerHTML = html;
}

function renderRoadAnalysis(){

    let a = detectRoad();

    if(!a){
        document.getElementById("roadAnalysis").innerHTML =
        "Chưa đủ dữ liệu";
        return;
    }

    document.getElementById("roadAnalysis").innerHTML = `
        🔥 Kết quả gần nhất: <b>${a.last}</b><br>
        📊 Streak: <b>${a.streak}</b><br>
        🔁 Pattern: <b>${a.pattern}</b><br>
        ⚡ Điểm cầu: <b>${a.score}/100</b>
    `;
}

function render(){

    renderHistory();
    renderRoad();
    renderMatrix();
    renderRoadAnalysis();

}

render();

</script>

</body>
</html>
